<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | Lumina</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/create.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">LUMINA</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#events">Events</a></li>
                    <li><a href="create-event.html" class="active">Create Event</a></li>
                </ul>
            </nav>
            <div class="auth-buttons" id="auth-container">
                <a href="login.html" class="btn btn-primary" id="auth-btn">Sign In</a>
            </div>
        </div>
    </header>

    <div class="create-wrapper">
        <div class="container">
            <div class="create-card glass">
                <h2>Host an Event</h2>
                <p class="subtitle">Share your experience with the world.</p>

                <form id="create-event-form">
                    <div class="form-grid">
                        <div class="form-group span-2">
                            <label>Event Title</label>
                            <input type="text" placeholder="e.g., Neon Lights Festival" required>
                        </div>

                        <div class="form-group span-2">
                            <label>Description</label>
                            <textarea placeholder="Describe the experience..." rows="4"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" required>
                        </div>

                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" required>
                        </div>

                        <div class="form-group span-2">
                            <label>Location Name</label>
                            <input type="text" placeholder="e.g., Cyber City Arena" required>
                        </div>

                        <div class="form-group span-2">
                            <label>Address</label>
                            <input type="text" id="event-address" placeholder="123 Event Street, City" required>
                        </div>

                        <div class="form-group">
                            <label>Latitude</label>
                            <input type="number" id="event-lat" placeholder="37.7749" step="any">
                        </div>
                        <div class="form-group">
                            <label>Longitude</label>
                            <input type="number" id="event-lng" placeholder="-122.4194" step="any">
                        </div>

                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" id="event-price" placeholder="150" min="0" required>
                        </div>

                        <div class="form-group">
                            <label>Capacity</label>
                            <input type="number" id="event-capacity" placeholder="500" min="1" required>
                        </div>

                        <div class="form-group span-2">
                            <label>Cover Image URL</label>
                            <input type="url" placeholder="https://..." required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg">Publish Event</button>
                        }
                </form>
            </div>
        </div>
    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/create_event.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Analytics | Lumina</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .analytics-container {
            padding: 120px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 40px;
        }

        .header-section span {
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Attendees Table */
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            padding: 20px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-success {
            color: #2ed573;
        }

        .status-pending {
            color: #f1c40f;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .table-container {
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>

    <header id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">LUMINA</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="organizer-dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
            <div class="auth-buttons" id="auth-container">
                <a href="login.html" class="btn btn-primary" id="auth-btn">Sign In</a>
            </div>
        </div>
    </header>

    <div class="analytics-container">

        <div class="header-section">
            <a href="organizer-dashboard.html" style="color: var(--text-muted); text-decoration: none;"><i
                    class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <br><br>
            <span id="event-date">Loading...</span>
            <h1 id="event-title">Loading Event...</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tickets</h3>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h3>Tickets Sold</h3>
                <div class="value" id="stat-sold" style="color: var(--primary-color);">0</div>
            </div>
            <div class="stat-card">
                <h3>Remaining</h3>
                <div class="value" id="stat-remaining">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <div class="value" id="stat-revenue">$0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Paid Attendees</h2>
                <button class="btn btn-secondary btn-sm" onclick="window.print()"><i class="fas fa-print"></i>
                    Export</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Tickets</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="attendees-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-muted);">Loading attendees...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/event-analytics.js"></script>
</body>

</html>

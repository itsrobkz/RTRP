<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets | Lumina</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/booking.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .coupon-input-group {
            display: flex;
            gap: 10px;
        }

        .coupon-input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 5px;
        }

        .coupon-msg {
            font-size: 0.9em;
            margin-top: 5px;
        }

        .text-success {
            color: #4ade80;
        }

        .text-danger {
            color: #f87171;
        }

        .price-breakdown {
            width: 100%;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.7);
        }

        .breakdown-row.total-row {
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }
    </style>
</head>

<body>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <header id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">LUMINA</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#events">Events</a></li>
                    <li><a href="create-event.html" id="nav-create-event">Create Event</a></li>
                </ul>
            </nav>
            <div class="auth-buttons" id="auth-container">
                <a href="login.html" class="btn btn-primary" id="auth-btn">Sign In</a>
            </div>
        </div>
    </header>

    <div class="booking-wrapper">
        <div class="container booking-container">

            <!-- Left: Event Summary -->
            <div class="event-summary glass">
                <div class="summary-image"
                    style="background-image: url('https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?auto=format&fit=crop&w=800&q=80');">
                </div>
                <div class="summary-details">
                    <h3>Neon Lights Festival 2026</h3>
                    <p class="date"><i class="far fa-calendar"></i> March 10, 2026</p>
                    <p class="venue"><i class="fas fa-map-marker-alt"></i> Cyber City Arena</p>
                    <div class="divider"></div>
                    <div class="price-row">
                        <span>Ticket Price</span>
                        <span class="price">$<span id="unit-price">150</span></span>
                    </div>
                </div>
            </div>

            <!-- Right: Booking Form -->
            <div class="booking-form-card glass">
                <div class="step-indicator">
                    <div class="step active">1</div>
                    <div class="line"></div>
                    <div class="step">2</div>
                    <div class="line"></div>
                    <div class="step">3</div>
                </div>

                <h2>Select Tickets</h2>

                <form id="booking-form">
                    <!-- Step 1: Quantity -->
                    <div class="form-group">
                        <label>Number of Seats</label>
                        <div class="quantity-selector">
                            <button type="button" class="qty-btn" onclick="updateQty(-1)">-</button>
                            <input type="number" id="qty" value="1" min="1" max="10" readonly>
                            <button type="button" class="qty-btn" onclick="updateQty(1)">+</button>
                        </div>
                    </div>

                    <!-- Step 2: Details -->
                    <div class="form-section">
                        <h3>Your Details</h3>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" placeholder="+1 234 567 8900">
                        </div>
                    </div>

                    <!-- Step 3: Coupon -->
                    <div class="form-group coupon-section">
                        <label>Coupon Code</label>
                        <div class="coupon-input-group">
                            <input type="text" id="coupon-code" placeholder="Enter Coupon Code">
                            <button type="button" class="btn btn-secondary" id="apply-coupon-btn">Apply</button>
                        </div>
                        <p id="coupon-message" class="coupon-msg"></p>
                    </div>

                    <!-- Total -->
                    <div class="total-section">
                        <div class="price-breakdown">
                            <div class="breakdown-row">
                                <span>Subtotal</span>
                                <span>$<span id="subtotal-price">0</span></span>
                            </div>
                            <div class="breakdown-row discount-row" style="display: none;">
                                <span>Discount</span>
                                <span class="text-success">-$<span id="discount-amount">0</span></span>
                            </div>
                            <div class="breakdown-row">
                                <span>GST (18% Incl.)</span>
                                <span>$<span id="gst-amount">0</span></span>
                            </div>
                            <div class="breakdown-row total-row">
                                <span>Total Amount</span>
                                <span class="total-price">$<span id="total-price">150</span></span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Proceed to Payment</button>
                    <p class="secure-note"><i class="fas fa-lock"></i> Secure Transaction</p>
                </form>
            </div>

        </div>
    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/booking.js"></script>
    <script>
        function updateQty(change) {
            const qtyInput = document.getElementById('qty');
            let val = parseInt(qtyInput.value) + change;
            if (val < 1) val = 1;
            if (val > 10) val = 10;
            qtyInput.value = val;

            // Update Total
            const unitPrice = 150;
            document.getElementById('total-price').innerText = val * unitPrice;
        }
    </script>
</body>

</html>
